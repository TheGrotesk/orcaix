name: Publish Minor Update
description: Bump the minor version, update all version references, commit and push. The GitHub Actions release workflow will create the tag and GitHub release automatically.
version: "1.0"

stages:
  - id: read_version
    type: shell
    command: node -p "require('./package.json').version"

  - id: confirm
    type: input
    message: |
      Current version: {{stages.read_version.output}}
      This will bump the MINOR version → x.Y.0

      Type "yes" to continue or anything else to abort:
    next:
      - condition: "['yes','y'].includes(output.toLowerCase().trim())"
        stage: bump
      - stage: abort

  - id: abort
    type: shell
    command: echo "Aborted — no changes made."

  - id: bump
    type: shell
    command: npm version minor --no-git-tag-version

  - id: read_new_version
    type: shell
    command: node -p "require('./package.json').version"

  - id: update_docs
    type: shell
    command: >
      node -e "
        const fs = require('fs');
        const v = require('./package.json').version;
        const file = './docs/index.html';
        const updated = fs.readFileSync(file, 'utf8')
          .replace(/v\d+\.\d+\.\d+/g, 'v' + v);
        fs.writeFileSync(file, updated);
        console.log('docs/index.html updated to v' + v);
      "

  - id: update_readme
    type: shell
    command: >
      node -e "
        const fs = require('fs');
        const v = require('./package.json').version;
        const file = './README.md';
        const updated = fs.readFileSync(file, 'utf8')
          .replace(/version-\d+\.\d+\.\d+-6366f1/g, 'version-' + v + '-6366f1')
          .replace(/releases\/tag\/v\d+\.\d+\.\d+/g, 'releases/tag/v' + v);
        fs.writeFileSync(file, updated);
        console.log('README.md updated to v' + v);
      "

  - id: git_commit_push
    type: workflow
    path: ./git-commit-push.yaml
    vars:
      default_commit_message: "bump version to {{stages.read_new_version.output}}"
      stage_files: "package.json package-lock.json docs/index.html README.md"
